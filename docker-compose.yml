services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: eduspace
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edupass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command:
      - "--config"
      - "/etc/livekit.yaml"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  livekit-egress:
    image: livekit/egress:latest
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
      - ./backend/media/recordings:/out
    depends_on:
      - livekit
      - redis

volumes:
  pgdata:

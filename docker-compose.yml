services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: eduspace
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edupass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: ["--dev", "--keys", "devkey: devsecret"]

volumes:
  pgdata:
